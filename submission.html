<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

		/* YOUR CSS CODE WILL GO HERE */
		.line2color {
			fill: rgb(0, 189, 0);
		}
		.line3color {
			fill: rgb(255, 143, 39);
		}
		.line1color {
			fill: rgb(43, 43, 131)
			;
		}
		.smalltext {
			font-size: 12px;
			text-anchor: middle;
		}


	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Acitivity by Song Sang Youn
	</h1>

	<svg id="visualization-activity">
		<!-- YOUR SVG CODE WILL GO HERE -->
		<rect x="20" y="28" width="40" height="172" class="line2color"/>
		<text x="40" y="220" class="smalltext">홍대입구</text>
		<rect x="95" y="38" width="40" height="162" class="line2color"/>
		<text x="115" y="220" class="smalltext">잠실</text>
		<rect x="170" y="48" width="40" height="152" class="line3color"/>
		<text x="190" y="220" class="smalltext">고속터미널</text>
		<rect x="245" y="58" width="40" height="142" class="line1color"/>
		<text x="265" y="220" class="smalltext">서울역</text>
		<rect x="320" y="60" width="40" height="140" class="line2color"/>
		<text x="340" y="220" class="smalltext">신림</text>
		<rect x="395" y="62" width="40" height="138" class="line2color"/>
		<text x="415" y="220" class="smalltext">신도림</text>

	</svg>

</body>
</html>
